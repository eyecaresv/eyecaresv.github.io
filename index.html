<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EyeCare SV質問bot</title>
    <style>
      :root {
        color-scheme: light;
        --blue: #5d8fdc;
        --blue-dark: #4779cc;
        --ink: #171b22;
        --muted: #7f8da3;
        --line: #dce7f7;
        --soft: #f2f7ff;
        --surface: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: #f5f8ff;
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic",
          "Noto Sans JP", "Segoe UI", sans-serif;
      }

      button,
      a {
        font: inherit;
      }

      .app {
        width: min(100%, 430px);
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0 auto;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        overflow: hidden;
        background: #f5f8ff;
        box-shadow: 0 24px 80px rgba(41, 84, 147, 0.18);
      }

      .topbar {
        min-height: 148px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: max(28px, env(safe-area-inset-top)) 18px 28px;
        border-bottom: 1px solid #dfe8f4;
        background: #fff;
      }

      .brand-logo {
        width: min(218px, 52vw);
        height: auto;
        display: block;
      }

      .manual-link {
        min-height: 48px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        flex: 0 0 auto;
        border: 1.5px solid #bfd1f2;
        border-radius: 999px;
        background: #fff;
        color: var(--blue);
        padding: 0 17px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 800;
        box-shadow: 0 10px 24px rgba(79, 125, 198, 0.08);
        white-space: nowrap;
      }

      .chat-zone {
        min-height: 0;
        display: grid;
        padding: 34px 18px 0;
      }

      #fc-chatbot-mount {
        min-height: 0;
      }

      .support-note {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 11px 0 max(14px, env(safe-area-inset-bottom));
        color: #b1bfd5;
        font-size: 13px;
        font-weight: 700;
      }

      @media (min-width: 760px) {
        body {
          padding: 0;
        }

        .app {
          min-height: 100vh;
          border: 1px solid #d8e2ee;
        }
      }

      @media (max-width: 460px) {
        .topbar {
          min-height: 116px;
          padding: max(22px, env(safe-area-inset-top)) 16px 20px;
        }

        .manual-link {
          min-height: 43px;
          padding: 0 13px;
          font-size: 12px;
        }

        .chat-zone {
          padding: 30px 16px 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="app" aria-label="EyeCare SV質問bot">
      <header class="topbar">
        <img class="brand-logo" src="/eyecare-logo.png" alt="眼の整体院 アイケアLaBo" />
        <a class="manual-link" href="https://eyecarelabo-fc-manual.netlify.app/" target="_blank" rel="noopener noreferrer">
          📖 マニュアルを見る
        </a>
      </header>

      <section class="chat-zone" aria-label="FC質問bot">
        <div id="fc-chatbot-mount"></div>
      </section>

      <footer class="support-note">🛡 このチャットはAIによってサポートされています</footer>
    </main>

    <script>
      window.FcManualChatbotConfig = {
        brandName: "アイケアLaBo FC",
        manualUrl: "https://eyecarelabo-fc-manual.netlify.app/",
        mountSelector: "#fc-chatbot-mount",
      };
    </script>
    <script src="/fc-manual-chatbot.js"></script>
  </body>
</html>
