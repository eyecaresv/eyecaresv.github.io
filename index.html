<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>アイケアLaBo FC AI</title>
    <style>
      :root {
        color-scheme: light;
        --blue: #5d8fdc;
        --blue-dark: #4779cc;
        --ink: #171b22;
        --muted: #7f8da3;
        --line: #dce7f7;
        --soft: #f2f7ff;
        --surface: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top, rgba(91, 143, 229, 0.08), transparent 34%),
          #f6f9ff;
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic",
          "Noto Sans JP", "Segoe UI", sans-serif;
      }

      button,
      a {
        font: inherit;
      }

      .app {
        width: min(100%, 430px);
        min-height: 100vh;
        min-height: 100dvh;
        margin: 0 auto;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        overflow: hidden;
        background: #f4f8ff;
        box-shadow: 0 28px 90px rgba(41, 84, 147, 0.18);
      }

      .topbar {
        min-height: 155px;
        display: grid;
        align-content: center;
        gap: 14px;
        padding: max(32px, env(safe-area-inset-top)) 28px 34px;
        background: linear-gradient(135deg, #3e8df4 0%, #0562da 100%);
        color: #fff;
        border-radius: 0 0 32px 32px;
      }

      .topbar h1 {
        margin: 0;
        font-size: 31px;
        line-height: 1.15;
        font-weight: 900;
        letter-spacing: 0;
      }

      .topbar p {
        margin: 0;
        font-size: 17px;
        line-height: 1.5;
        font-weight: 500;
      }

      .chat-zone {
        min-height: 0;
        display: grid;
        padding: 0 15px 0;
        margin-top: -18px;
      }

      #fc-chatbot-mount {
        min-height: 0;
      }

      .support-note {
        display: none;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 11px 0 max(14px, env(safe-area-inset-bottom));
        color: #b1bfd5;
        font-size: 13px;
        font-weight: 700;
      }

      @media (min-width: 760px) {
        body {
          padding: 0;
        }

        .app {
          min-height: 100vh;
          border: 1px solid #d8e2ee;
        }
      }

      @media (max-width: 460px) {
        .topbar {
          min-height: 150px;
          padding: max(30px, env(safe-area-inset-top)) 26px 32px;
        }

        .chat-zone {
          padding: 0 15px 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="app" aria-label="EyeCare SV質問bot">
      <header class="topbar">
        <h1>アイケアLaBo FC AI</h1>
        <p>FC運営について何でも質問してください</p>
      </header>

      <section class="chat-zone" aria-label="FC質問bot">
        <div id="fc-chatbot-mount"></div>
      </section>

      <footer class="support-note">🛡 このチャットはAIによってサポートされています</footer>
    </main>

    <script>
      window.FcManualChatbotConfig = {
        brandName: "アイケアLaBo FC",
        manualUrl: "https://eyecarelabo-fc-manual.netlify.app/",
        mountSelector: "#fc-chatbot-mount",
      };
    </script>
    <script src="/fc-manual-chatbot.js?v=manual-actions"></script>
  </body>
</html>
